<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f4034" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Workout Log" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Workout & Hike Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Workout & Hike Tracker</p>
      <h1>Build routines. Log progress.</h1>
      <p class="subtitle">Dumbbell, gym, core, hiking, and upper-body planning.</p>
    </div>
  </header>

  <main>
    <section id="dashboard" class="panel active">
      <div class="section-heading">
        <h2>Dashboard</h2>
        <button class="secondary" id="exportData">Export backup</button>
      </div>
      <div class="stats-grid">
        <button class="stat-card nav-card" data-go="builder"><span id="routineCount">0</span><p>Saved routines</p></button>
        <button class="stat-card nav-card" data-go="logWorkout"><span id="workoutCount">0</span><p>Workouts logged</p></button>
        <button class="stat-card nav-card" data-go="logHike"><span id="hikeCount">0</span><p>Hikes logged</p></button>
        <button class="stat-card nav-card" data-go="history"><span id="hikeMiles">0</span><p>Total hike miles</p></button>
      </div>
      <div class="card">
        <h3>Start fast</h3>
        <div class="quick-actions">
          <button class="primary" data-go="library">Find exercises</button>
          <button class="primary" data-go="builder">Build routine</button>
          <button class="primary" data-go="logHike">Log hike</button>
        </div>
      </div>
      <div class="card">
        <h3>Latest Activity</h3>
        <div id="latestActivity" class="empty">No activity yet.</div>
      </div>
    </section>

    <section id="library" class="panel">
      <div class="section-heading"><h2>Exercise Library</h2></div>
      <div class="controls sticky-controls">
        <input id="exerciseSearch" type="search" placeholder="Search exercises..." autocomplete="off" />
        <select id="muscleFilter"><option value="All">All muscle groups</option></select>
        <select id="equipmentFilter"><option value="All">All equipment</option></select>
      </div>
      <div id="exerciseList" class="exercise-list"></div>
    </section>

    <section id="builder" class="panel">
      <div class="section-heading"><h2>Routine Builder</h2></div>
      <div class="card">
        <label>Routine name
          <input id="routineName" type="text" placeholder="Example: Back + Core Day" />
        </label>
        <label>Routine focus
          <select id="routineFocus">
            <option>Back</option><option>Core</option><option>Upper Body</option><option>Lower Body</option>
            <option>Full Body</option><option>Hiking Prep</option><option>Dumbbell Only</option><option>Gym Machines</option>
          </select>
        </label>
      </div>
      <div class="card">
        <h3>Add exercises</h3>
        <div class="controls compact">
          <input id="builderSearch" type="search" placeholder="Search to add..." autocomplete="off" />
          <select id="builderMuscleFilter"><option value="All">All</option></select>
        </div>
        <div id="builderExerciseList" class="mini-list"></div>
      </div>
      <div class="card selected-card">
        <h3>Selected Exercises</h3>
        <div id="selectedExercises" class="selected-list empty">No exercises selected.</div>
        <button id="saveRoutine" class="primary full">Save Routine</button>
      </div>
    </section>

    <section id="logWorkout" class="panel">
      <div class="section-heading"><h2>Log Workout</h2></div>
      <div class="card">
        <label>Date <input id="workoutDate" type="date" /></label>
        <label>Routine <select id="workoutRoutine"></select></label>
        <div id="workoutExerciseInputs"></div>
        <label>Notes
          <textarea id="workoutNotes" placeholder="How did it feel? Soreness, wins, changes..."></textarea>
        </label>
        <button id="saveWorkout" class="primary full">Save Workout</button>
      </div>
    </section>

    <section id="logHike" class="panel">
      <div class="section-heading"><h2>Log Hike</h2></div>
      <div class="card form-grid">
        <label>Date <input id="hikeDate" type="date" /></label>
        <label>Trail / Location <input id="hikeTrail" type="text" placeholder="Example: local park loop" /></label>
        <label>Distance miles <input id="hikeDistance" inputmode="decimal" type="number" min="0" step="0.01" /></label>
        <label>Time minutes <input id="hikeMinutes" inputmode="numeric" type="number" min="0" step="1" /></label>
        <label>Steps <input id="hikeSteps" inputmode="numeric" type="number" min="0" step="1" /></label>
        <label>Difficulty <select id="hikeDifficulty"><option>Easy</option><option>Moderate</option><option>Hard</option></select></label>
        <label class="wide">Notes
          <textarea id="hikeNotes" placeholder="Mud, weather, elevation, how your body felt..."></textarea>
        </label>
        <button id="saveHike" class="primary wide">Save Hike</button>
      </div>
    </section>

    <section id="history" class="panel">
      <div class="section-heading"><h2>History</h2></div>
      <div class="segmented" role="tablist" aria-label="History type">
        <button class="segment active" data-history="routineHistory">Routines</button>
        <button class="segment" data-history="workoutHistory">Workouts</button>
        <button class="segment" data-history="hikeHistory">Hikes</button>
      </div>
      <div class="card history-pane active" id="routineHistory"></div>
      <div class="card history-pane" id="workoutHistory"></div>
      <div class="card history-pane" id="hikeHistory"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Main sections">
    <button class="tab active" data-tab="dashboard"><span>⌂</span>Home</button>
    <button class="tab" data-tab="library"><span>☰</span>Library</button>
    <button class="tab" data-tab="builder"><span>＋</span>Build</button>
    <button class="tab" data-tab="logWorkout"><span>✓</span>Lift</button>
    <button class="tab" data-tab="logHike"><span>△</span>Hike</button>
    <button class="tab" data-tab="history"><span>◷</span>History</button>
  </nav>

  <template id="exerciseCardTemplate">
    <article class="exercise-card">
      <div>
        <h3></h3>
        <p class="meta"></p>
        <p class="cue"></p>
      </div>
      <button class="secondary add-btn">Add</button>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
